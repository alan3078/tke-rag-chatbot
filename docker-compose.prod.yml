# =============================================================================
# Production Docker Compose — TKE RAG Chatbot
# System nginx (outside Docker) proxies to these containers on localhost.
# =============================================================================
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: tke_rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    image: ghcr.io/${GITHUB_REPO:-alanyiu/tke-rag-chatbot}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/tke_rag
      - NODE_ENV=production
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    image: ghcr.io/${GITHUB_REPO:-alanyiu/tke-rag-chatbot}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
