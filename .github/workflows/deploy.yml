name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set repo name lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set repo name lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy deployment files
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key"
          SCP_CMD="scp -i ~/.ssh/deploy_key"
          DEPLOY_DIR="/opt/tke-rag-chatbot"

          # Copy docker-compose
          $SCP_CMD docker-compose.prod.yml ${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/docker-compose.yml

          # Copy nginx site config (deploy user has sudo for this)
          $SCP_CMD deploy/nginx-site.conf ${SSH_USER}@${SSH_HOST}:/tmp/nginx-site.conf
          $SSH_CMD ${SSH_USER}@${SSH_HOST} "sudo cp /tmp/nginx-site.conf /etc/nginx/sites-available/default && rm /tmp/nginx-site.conf"

      - name: Write .env.prod
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} "cat > /opt/tke-rag-chatbot/.env.prod << 'EOF'
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL=https://openrouter.ai/api/v1
          LLM_MODEL=${{ vars.LLM_MODEL || 'deepseek/deepseek-v4-flash' }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          SEED_ADMIN_USERNAME=${{ vars.ADMIN_USERNAME || 'admin' }}
          SEED_ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EOF"

      - name: Deploy containers + reload nginx
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} << DEPLOY
          set -e
          cd /opt/tke-rag-chatbot

          export GITHUB_REPO="${REPO_LC}"
          export IMAGE_TAG="${{ github.sha }}"

          echo "── Pulling images ──"
          docker compose pull backend frontend

          echo "── Starting services ──"
          docker compose up -d --remove-orphans

          echo "── Waiting for backend health ──"
          for i in \$(seq 1 30); do
            if wget --spider -q http://127.0.0.1:3001/api/health 2>/dev/null; then
              echo "Backend healthy!"
              break
            fi
            [ \$i -eq 30 ] && echo "WARNING: health check timed out"
            sleep 5
          done

          echo "── Reloading nginx ──"
          sudo nginx -t && sudo systemctl reload nginx

          echo "── Deploy complete ──"
          docker compose ps
          DEPLOY
