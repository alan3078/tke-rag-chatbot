name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy nginx config
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          scp -i ~/.ssh/deploy_key deploy/nginx-site.conf ${SSH_USER}@${SSH_HOST}:/tmp/nginx-site.conf
          ssh -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} \
            "sudo cp /tmp/nginx-site.conf /etc/nginx/sites-available/default && rm /tmp/nginx-site.conf"

      - name: Write .env.prod
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} "cat > /opt/tke-rag-chatbot/.env.prod << 'EOF'
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL=https://openrouter.ai/api/v1
          LLM_MODEL=${{ vars.LLM_MODEL || 'deepseek/deepseek-v4-flash' }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          SEED_ADMIN_USERNAME=${{ vars.ADMIN_USERNAME || 'admin' }}
          SEED_ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          EOF"

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key ${SSH_USER}@${SSH_HOST} << 'DEPLOY'
          set -e
          DEPLOY_DIR="/opt/tke-rag-chatbot"
          REPO_URL="https://github.com/${{ github.repository }}.git"

          echo "── Clone or update repo ──"
          if [ -d "${DEPLOY_DIR}/.git" ]; then
            cd "${DEPLOY_DIR}"
            git fetch origin main
            git reset --hard origin/main
          else
            git clone --depth=1 "${REPO_URL}" "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"
          fi

          # Use prod compose file
          cp docker-compose.prod.yml docker-compose.yml

          echo "── Build images (using DaoCloud mirror) ──"
          docker compose build --parallel

          echo "── Start containers ──"
          docker compose up -d --remove-orphans

          echo "── Waiting for postgres ──"
          for i in $(seq 1 20); do
            if docker compose exec -T postgres pg_isready -U postgres 2>/dev/null; then
              echo "Postgres ready!"
              break
            fi
            sleep 3
          done

          echo "── Run migrations ──"
          docker compose exec -T backend npm run migrate

          echo "── Seed admin user ──"
          docker compose exec -T backend npm run seed || true

          echo "── Wait for backend health ──"
          for i in $(seq 1 20); do
            if wget --spider -q http://127.0.0.1:3001/api/health 2>/dev/null; then
              echo "Backend healthy!"
              break
            fi
            sleep 5
          done

          echo "── Reload nginx ──"
          sudo nginx -t && sudo systemctl reload nginx

          echo "── Deploy complete ──"
          docker compose ps
          DEPLOY
